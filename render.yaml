## ─────────────────────────────────────────────────────────────────────────────
## render.yaml — NSRIT eSports Arena
## Declares the web service + PostgreSQL database as a single blueprint.
## One-click deploy: Render Dashboard → Blueprints → New Blueprint Instance
## ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: nsrit-esports-db
    databaseName: nsrit_esports
    user: nsrit_esports_user
    plan: free                    # 1 GB SSD, expires after 90 days on free tier

services:
  - type: web
    name: nsrit-esports-arena
    runtime: python
    plan: free                    # Free tier: 512 MB RAM, 0.1 CPU, spins down after 15 min inactivity
    buildCommand: "./build.sh"
    startCommand: "gunicorn nsrit_esports.wsgi:application --workers 1 --threads 2 --timeout 300 --log-file -"
    envVars:
      - key: SECRET_KEY
        generateValue: true       # Render auto-generates a secure random value
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: nsrit-esports-db
          property: connectionString
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          name: nsrit-esports-arena
          type: web
          property: host
      - key: ALLOWED_HOSTS
        fromService:
          name: nsrit-esports-arena
          type: web
          property: host
      # ── Fill these in manually after first deploy ──────────────────────────
      # EMAIL_HOST_USER        → your Gmail address
      # EMAIL_HOST_PASSWORD    → Gmail App Password (not your login password)
      # RAZORPAY_KEY_ID        → from Razorpay dashboard
      # RAZORPAY_KEY_SECRET    → from Razorpay dashboard
      # ADMIN_URL              → something secret, e.g. nsrit-ctrl-x9k2/
